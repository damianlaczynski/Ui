<div class="ds">
  <!-- Header -->
  <header #headerRef class="ds__header">
    <div class="ds__header__left">
      <ui-button
        class="ds__header__menu-button"
        variant="primary"
        [icon]="isSidebarOpen() ? 'dismiss' : 'navigation'"
        size="medium"
        (click)="toggleSidebar()"
        [attr.aria-label]="isSidebarOpen() ? 'Close sidebar' : 'Open sidebar'"
      ></ui-button>
      <h1 class="ds__header__title" (click)="navigateToHome()">Angular UI</h1>
    </div>
    <div class="ds__header__right">
      <div class="ds__header__meta">
        <span class="ds__header__version">v{{ version }}</span>
        <a
          [href]="githubUrl"
          target="_blank"
          rel="noopener noreferrer"
          class="ds__header__link"
          aria-label="GitHub"
        >
          <ui-icon icon="open" size="small"></ui-icon>
        </a>
        <a
          [href]="npmUrl"
          target="_blank"
          rel="noopener noreferrer"
          class="ds__header__link"
          aria-label="npm"
        >
          <ui-icon icon="arrow_download" size="small"></ui-icon>
        </a>
        @if (!isMobile()) {
          <ui-button
            variant="primary"
            appearance="transparent"
            size="medium"
            text="Theme builder"
            (click)="themeBuilder.toggleDrawer()"
            [attr.aria-label]="
              themeBuilder.drawerOpen() ? 'Close theme builder' : 'Open theme builder'
            "
          />
          <div class="ds__theme-switcher">
            <button
              type="button"
              class="ds__theme-switcher__mode"
              (click)="toggleTheme()"
              [attr.aria-label]="themeLabel()"
            >
              <ui-icon [icon]="themeIcon()" size="small"></ui-icon>
              <span>{{ themeLabel() }}</span>
            </button>

            <span class="ds__theme-switcher__label">{{ currentThemeVariantLabel() }}</span>

            <div class="ds__theme-switcher__variants" role="radiogroup" aria-label="Theme variants">
              @for (variant of themeVariants; track variant.id) {
                <button
                  type="button"
                  class="ds__theme-switcher__variant"
                  [class.ds__theme-switcher__variant--active]="currentThemeVariant() === variant.id"
                  [style.--variant-primary]="variant.previewPrimary"
                  [style.--variant-secondary]="variant.previewSecondary"
                  [attr.aria-label]="variant.label"
                  [attr.title]="variant.label"
                  [attr.aria-checked]="currentThemeVariant() === variant.id"
                  role="radio"
                  (click)="setThemeVariant(variant.id)"
                >
                  <span class="ds__theme-switcher__swatch"></span>
                </button>
              }
            </div>
          </div>
        }
        @if (isMobile()) {
          <ui-button
            variant="primary"
            appearance="transparent"
            size="medium"
            icon="color"
            (click)="themeBuilder.toggleDrawer()"
            [attr.aria-label]="themeBuilder.drawerOpen() ? 'Close theme' : 'Open theme'"
          />
        }
        <!-- TODO: Add direction support -->
        <!-- <div class="ds__direction-switcher" role="group" aria-label="Layout direction">
          <button
            type="button"
            class="ds__direction-switcher__button"
            [class.ds__direction-switcher__button--active]="direction() === 'ltr'"
            (click)="setDirection('ltr')"
          >
            LTR
          </button>
          <button
            type="button"
            class="ds__direction-switcher__button"
            [class.ds__direction-switcher__button--active]="direction() === 'rtl'"
            (click)="setDirection('rtl')"
          >
            RTL
          </button>
        </div> -->
      </div>
    </div>
  </header>

  <!-- Content Area -->
  <div class="ds__content">
    <ui-drawer
      title="Navigation"
      [type]="isMobile() ? 'overlay' : 'inline'"
      position="left"
      size="medium"
      [modalType]="isMobile() ? 'modal' : 'alert'"
      [bodyScrollable]="false"
      [visible]="isSidebarOpen()"
      [closable]="isMobile() ? true : false"
      (close)="closeSidebar()"
    >
      <app-ds-sidebar></app-ds-sidebar>
    </ui-drawer>

    <!-- Main Content -->
    <div #mainContent class="ds__main-content">
      <router-outlet></router-outlet>
    </div>

    <div class="ds__theme-drawer-wrapper">
      <app-theme-drawer [isMobile]="isMobile()" />
    </div>
  </div>
</div>
