@if (shouldRender()) {
  <div
    [class]="backdropClasses()"
    (mousedown)="onBackdropMouseDown($event)"
    role="dialog"
    [attr.aria-modal]="true"
    [attr.aria-hidden]="!(visible() || isClosing())"
    [attr.aria-label]="getDialogAriaLabel()"
    (animationend)="onBackdropAnimationEnd($event)"
  >
    <div [class]="frameClasses()" role="document">
      <div
        [class]="surfaceClasses()"
        cdkTrapFocus
        cdkTrapFocusAutoCapture
        (animationend)="onSurfaceAnimationEnd($event)"
      >
        <div class="command-palette__body">
          <div class="command-palette__search">
            <ui-search
              inputVariant="filled-gray"
              [placeholder]="getPlaceholderText()"
              [size]="'large'"
              [(ngModel)]="_searchQuery"
              [ngModelOptions]="{ standalone: true }"
              (ngModelChange)="onSearchChange($event)"
            />
          </div>

          <div
            class="command-palette__results"
            role="listbox"
            [attr.aria-activedescendant]="selectedItemId()"
            [attr.aria-label]="getResultsAriaLabel()"
          >
            @if (filteredItems().length > 0) {
              @for (group of groupedItems(); track trackByGroupId($index, group)) {
                @if (group.items.length > 0) {
                  @if (group.label) {
                    <div class="command-palette__group-header" [id]="groupHeaderId(group)">
                      {{ group.label }}
                    </div>
                  }

                  <div
                    class="command-palette__group-items"
                    role="group"
                    [attr.aria-labelledby]="group.label ? groupHeaderId(group) : null"
                  >
                    @for (item of group.items; track trackByItemId($index, item)) {
                      <button
                        type="button"
                        role="option"
                        [id]="itemId(item)"
                        class="command-palette__item"
                        [class.command-palette__item--disabled]="item.disabled"
                        [disabled]="item.disabled"
                        [attr.aria-selected]="isItemSelected(item)"
                        [attr.aria-disabled]="item.disabled || null"
                        (click)="onItemClick(item)"
                        (focus)="onItemFocus(item)"
                        [attr.aria-label]="item.description || item.label"
                      >
                        @if (item.icon) {
                          <div class="command-palette__item-icon">
                            <ui-icon [icon]="item.icon" [size]="'medium'" />
                          </div>
                        }

                        <div class="command-palette__item-content">
                          <div class="command-palette__item-label">{{ item.label }}</div>
                          @if (item.description) {
                            <div class="command-palette__item-description">
                              {{ item.description }}
                            </div>
                          }
                        </div>

                        @if (item.disabled) {
                          <div class="command-palette__item-status">
                            <ui-icon icon="lock_closed" [size]="'medium'" aria-hidden="true" />
                          </div>
                        }
                      </button>
                    }
                  </div>
                }
              }
            } @else {
              <ui-empty-state
                role="status"
                icon="search"
                [title]="getEmptyText()"
                [description]="getEmptyDescription()"
              />
            }
          </div>
        </div>
      </div>
    </div>
  </div>
}
