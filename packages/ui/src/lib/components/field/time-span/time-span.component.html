<ui-field
  [fieldType]="'text'"
  [label]="label()"
  [placeholder]="placeholder()"
  [helpText]="helpText()"
  [(errorText)]="errorText"
  [required]="required()"
  [disabled]="disabled()"
  [readonly]="readonly()"
  [autocomplete]="autocomplete()"
  [id]="id()"
  [name]="name()"
  [size]="size()"
  [inputVariant]="inputVariant()"
>
  <div class="input-wrapper" [class]="wrapperClasses">
    <!-- Time Span Input (editable) -->
    <input
      #triggerElement
      class="input timespan-input"
      type="text"
      [id]="id()"
      [name]="name()"
      [placeholder]="placeholder()"
      [required]="required()"
      [disabled]="disabled()"
      [readonly]="readonly()"
      [value]="displayText()"
      [attr.tabindex]="getTabIndex()"
      [attr.aria-label]="ariaLabel() || label()"
      [attr.aria-describedby]="ariaDescribedBy()"
      [attr.aria-invalid]="!!errorText()"
      [attr.aria-expanded]="isOpen()"
      [attr.aria-haspopup]="'dialog'"
      (click)="togglePanel()"
      (input)="onTimeSpanInputChange($event)"
      (blur)="onBlur($event)"
      (focus)="onFocus($event)"
      (keydown)="onKeyDown($event)"
    />
    <!-- Actions: Clear button and chevron -->
    @if (!disabled() && !readonly()) {
      <div class="field__actions">
        @if (clearable() && !isEmpty()) {
          <ui-action-button [icon]="'dismiss'" [size]="size()" (click)="clearSelection()" />
        }
        <ui-action-button [icon]="'chevron_down'" [size]="size()" (click)="togglePanel()" />
      </div>
    }
  </div>
</ui-field>

<!-- Time Span Panel - rendered via CDK Overlay -->
<ng-template #panelTemplate>
  <div
    role="dialog"
    class="timespan-panel"
    [class.timespan-panel--small]="size() === 'small'"
    [class.timespan-panel--medium]="size() === 'medium'"
    [class.timespan-panel--large]="size() === 'large'"
    [style.max-height]="maxHeight()"
  >
    <div class="timespan-panel__content">
      @for (unit of availableUnits(); track unit.key) {
        <div class="timespan-panel__unit">
          <div class="time-span-wheel">
            <div
              #wheelElement
              class="time-span-wheel__wheel"
              role="listbox"
              [attr.aria-label]="unit.label"
              [attr.tabindex]="disabled() || readonly() ? -1 : 0"
              [class.time-span-wheel__wheel--dragging]="isUnitDragging(unit.key)"
              (wheel)="onUnitWheel(unit.key, $event)"
              (keydown)="onWheelKeyDown(unit.key, $event)"
              (pointerdown)="onWheelPointerDown(unit.key, $event)"
              (pointermove)="onWheelPointerMove(unit.key, wheelElement, $event)"
              (pointerup)="onWheelPointerUp(unit.key, wheelElement, $event)"
              (pointercancel)="onWheelPointerUp(unit.key, wheelElement, $event)"
            >
              @for (option of getWheelOptions(unit.key); track $index) {
                <button
                  type="button"
                  role="option"
                  tabindex="-1"
                  [disabled]="disabled() || readonly() || option.value === null"
                  [class]="getOptionClass(option)"
                  [attr.aria-selected]="option.isSelected"
                  (click)="onOptionClick(unit.key, wheelElement, $event)"
                >
                  {{ formatWheelOption(unit.key, option.value) }}
                </button>
              }
            </div>
            <div class="time-span-wheel__selection" aria-hidden="true"></div>
          </div>
          <span class="timespan-panel__unit-short-label">{{ unit.shortLabel }}</span>
        </div>
      }
    </div>
  </div>
</ng-template>
