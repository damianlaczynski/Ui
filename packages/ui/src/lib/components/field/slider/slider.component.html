<ui-field
  [fieldType]="'slider'"
  [label]="label()"
  [placeholder]="placeholder()"
  [helpText]="helpText()"
  [errorText]="errorText()"
  [required]="required()"
  [disabled]="disabled()"
  [readonly]="readonly()"
  [autocomplete]="autocomplete()"
  [id]="id()"
  [name]="name()"
  [size]="size()"
  [inputVariant]="inputVariant()"
>
  <div class="slider-wrapper" [ngClass]="sliderClasses()">
    <div class="slider-container" [class.slider-container--with-minmax]="showMinMax()">
      @if (showMinMax()) {
        <span class="slider-minmax slider-minmax--min" [attr.aria-hidden]="true">{{
          formatValue()(min())
        }}</span>
      }
      <div class="slider-input-wrapper" (mousedown)="onMouseDown()" (mouseup)="onMouseUp()">
        <input
          #sliderInput
          [id]="id()"
          [name]="name()"
          type="range"
          class="slider-input"
          [class.slider-input--readonly]="readonly()"
          [attr.orient]="vertical() ? 'vertical' : 'horizontal'"
          [min]="min()"
          [max]="max()"
          [step]="step()"
          [value]="currentValue()"
          [required]="required()"
          [disabled]="disabled()"
          [attr.aria-readonly]="readonly() ? 'true' : null"
          [attr.aria-label]="computedAriaLabel()"
          [attr.aria-describedby]="getComputedAriaDescribedBy()"
          [attr.aria-valuemin]="min()"
          [attr.aria-valuemax]="max()"
          [attr.aria-valuenow]="currentValue()"
          [attr.aria-valuetext]="computedAriaValueText()"
          (input)="onSliderInput($event)"
          (change)="onSliderChange($event)"
          (keydown)="onSliderKeyDown($event)"
          (focus)="onFocus($event)"
          (blur)="onBlur($event)"
        />

        <div
          class="slider-visual"
          [class.slider-visual--with-steps]="showStepMarkers()"
          [ngStyle]="visualStyle()"
        >
          <div class="slider-thumb-wrapper" [ngStyle]="thumbWrapperStyle()">
            <div class="slider-thumb"></div>
          </div>
        </div>
      </div>
      @if (showMinMax()) {
        <span class="slider-minmax slider-minmax--max" [attr.aria-hidden]="true">{{
          formatValue()(max())
        }}</span>
      }
    </div>
  </div>
</ui-field>
