<ui-field
  [fieldType]="'checkbox'"
  [helpText]="helpText()"
  [(errorText)]="errorText"
  [required]="required()"
  [disabled]="disabled()"
  [readonly]="readonly()"
  [id]="id()"
  [name]="name()"
  [size]="size()"
>
  <div class="checkbox-wrapper" [ngClass]="checkboxClasses()">
    @if (label() && labelPosition() === 'above') {
      <div class="checkbox-label-above">
        <span [ngClass]="checkboxLabelClasses()"> {{ label() }} </span>
      </div>
    }

    <label class="checkbox-container">
      @if (label() && labelPosition() === 'before') {
        <span [ngClass]="checkboxLabelClasses()" class="checkbox-label-before">
          {{ label() }}
        </span>
      }

      <!-- Hidden native checkbox for accessibility and form integration -->
      <input
        type="checkbox"
        [id]="id()"
        [name]="name()"
        [checked]="isChecked()"
        [indeterminate]="isIndeterminate()"
        [disabled]="disabled()"
        [attr.aria-label]="computedAriaLabel()"
        [attr.aria-describedby]="ariaDescribedBy()"
        [attr.required]="required() ? true : null"
        class="checkbox-input"
        (change)="onCheckboxChange($event)"
        (focus)="onFocus($event)"
        (blur)="onBlur($event)"
        (click)="onCheckboxClick($event)"
      />

      <!-- Visual checkbox element -->
      <div class="checkbox-visual">
        <ui-icon [icon]="iconName()" [size]="size()" [variant]="iconVariant()" />
      </div>

      @if (label() && labelPosition() === 'after') {
        <span [ngClass]="checkboxLabelClasses()" class="checkbox-label-after"> {{ label() }} </span>
      }
    </label>

    @if (label() && labelPosition() === 'below') {
      <div class="checkbox-label-below">
        <span [ngClass]="checkboxLabelClasses()"> {{ label() }} </span>
      </div>
    }
  </div>
</ui-field>
