<ui-field
  [fieldType]="'text'"
  [label]="label()"
  [labelPosition]="labelPosition()"
  [helpText]="helpText()"
  [(errorText)]="errorText"
  [required]="required()"
  [disabled]="disabled()"
  [readonly]="readonly()"
  [id]="id()"
  [name]="name()"
  [size]="size()"
  [inputVariant]="inputVariant()"
  [ariaLabel]="ariaLabel()"
  [ariaDescribedBy]="ariaDescribedBy()"
>
  <div
    [class]="totpContainerClasses()"
    role="group"
    [attr.aria-labelledby]="getContainerAriaLabelledBy()"
    [attr.aria-label]="getContainerAriaLabel()"
    [attr.aria-describedby]="getComputedAriaDescribedBy()"
    [attr.aria-invalid]="!!errorText()"
  >
    @for (digit of digits(); track $index) {
      <div [class]="totpInputWrapperClasses()">
        <input
          #digitInput
          class="input totp-digit"
          type="text"
          inputmode="numeric"
          autocomplete="one-time-code"
          [id]="id() + '-' + $index"
          [name]="name() + '-' + $index"
          maxlength="1"
          pattern="[0-9]"
          [attr.placeholder]="getDigitPlaceholder($index)"
          [value]="digit"
          [disabled]="disabled()"
          [readonly]="readonly()"
          [attr.aria-label]="getDigitAriaLabel($index)"
          [attr.aria-describedby]="getComputedAriaDescribedBy()"
          [attr.aria-invalid]="!!errorText()"
          [attr.data-index]="$index"
          (input)="onDigitInput($event, $index)"
          (keydown)="onDigitKeyDown($event, $index)"
          (paste)="onDigitPaste($event, $index)"
          (focus)="onDigitFocus($event)"
          (blur)="onBlur($event)"
        />
      </div>
    }
  </div>
</ui-field>
