<ui-field
  [fieldType]="'switch'"
  [placeholder]="placeholder()"
  [helpText]="helpText()"
  [(errorText)]="errorText"
  [required]="required()"
  [disabled]="disabled()"
  [readonly]="readonly()"
  [autocomplete]="autocomplete()"
  [id]="id()"
  [name]="name()"
  [size]="size()"
  [inputVariant]="inputVariant()"
>
  <div class="switch-wrapper" [ngClass]="switchClasses()">
    <!-- Label Above -->
    @if (label() && labelPosition() === 'above') {
      <div class="switch-label-above">
        <span [ngClass]="switchLabelClasses()">{{ label() }}</span>
      </div>
    }

    <label class="switch-container">
      <!-- Label Before -->
      @if (label() && labelPosition() === 'before') {
        <span [ngClass]="switchLabelClasses()" class="switch-label-before">
          {{ label() }}
        </span>
      }

      <!-- Hidden native checkbox for accessibility and form integration -->
      <input
        type="checkbox"
        class="switch-input"
        [id]="id()"
        [name]="name()"
        [checked]="isChecked()"
        [disabled]="disabled()"
        [attr.aria-label]="computedAriaLabel()"
        [attr.aria-describedby]="getComputedAriaDescribedBy()"
        [attr.required]="required() ? true : null"
        (change)="onSwitchChange($event)"
        (focus)="onFocus($event)"
        (blur)="onBlur($event)"
        (click)="onSwitchClick($event)"
      />

      <!-- Visual switch element -->
      <div class="switch-visual" [attr.aria-hidden]="true">
        <svg
          width="56"
          height="36"
          viewBox="0 0 56 36"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          class="switch-svg"
        >
          <rect x="8" y="8" width="40" height="20" rx="10" [ngClass]="trackClasses()" />
          <circle cx="18" cy="18" r="7" [ngClass]="thumbClasses()" />
        </svg>
      </div>

      <!-- Label After -->
      @if (label() && labelPosition() === 'after') {
        <span [ngClass]="switchLabelClasses()" class="switch-label-after">
          {{ label() }}
        </span>
      }
    </label>

    <!-- Label Below -->
    @if (label() && labelPosition() === 'below') {
      <div class="switch-label-below">
        <span [ngClass]="switchLabelClasses()">{{ label() }}</span>
      </div>
    }
  </div>
</ui-field>
