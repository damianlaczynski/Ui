<ui-field
  [fieldType]="'file'"
  [label]="label()"
  [labelPosition]="labelPosition()"
  [placeholder]="placeholder()"
  [helpText]="helpText()"
  [(errorText)]="errorText"
  [required]="required()"
  [disabled]="disabled()"
  [readonly]="readonly()"
  [id]="id()"
  [name]="name()"
  [size]="size()"
  [inputVariant]="inputVariant()"
>
  <!-- Inline Mode (text-input-like) -->
  @if (mode() === 'inline') {
    <div class="input-wrapper" [class]="wrapperClasses">
      <input
        #fileInput
        class="file-input"
        type="file"
        [name]="name()"
        [accept]="accept()"
        [multiple]="multiple()"
        [disabled]="disabled()"
        [required]="required()"
        [tabindex]="-1"
        [attr.aria-hidden]="true"
        (change)="onFileInputChange($event)"
      />
      <input
        class="input file-display"
        type="text"
        [id]="id()"
        [value]="displayText()"
        [placeholder]="getInlinePlaceholder()"
        [readonly]="true"
        [disabled]="disabled()"
        [attr.aria-label]="getInlineTriggerAriaLabel()"
        [attr.aria-describedby]="getComputedAriaDescribedBy()"
        [attr.aria-invalid]="!!errorText()"
        (click)="triggerFileInput()"
        (focus)="onFocus($event)"
        (blur)="onBlur($event)"
        (keydown)="onTriggerKeydown($event)"
        [tabindex]="getTabIndex()"
        role="button"
      />
      @if (!disabled() && !readonly()) {
        <div class="field__actions">
          <!-- Browse Button -->
          <ui-action-button
            [icon]="'document'"
            [size]="size()"
            [ariaLabel]="getInlineTriggerAriaLabel()"
            (click)="triggerFileInput()"
          ></ui-action-button>

          <!-- Clear Button -->
          @if (selectedFiles().length > 0) {
            <ui-action-button
              [icon]="'dismiss'"
              [size]="size()"
              [ariaLabel]="getClearFilesAriaLabel()"
              (click)="clear()"
            ></ui-action-button>
          }
        </div>
      }
    </div>
  }

  <!-- Area Mode (drag-and-drop area) -->
  @if (mode() === 'area') {
    <div class="input-wrapper" [class]="wrapperClasses">
      <!-- File Input Area / Drop Zone -->
      <div
        class="file"
        [class]="fileWrapperClasses()"
        (click)="triggerFileInput()"
        (keydown)="onTriggerKeydown($event)"
        [tabindex]="getTabIndex()"
        [attr.aria-label]="getAreaTriggerAriaLabel()"
        [attr.aria-describedby]="getComputedAriaDescribedBy()"
        [attr.aria-invalid]="!!errorText()"
        role="button"
      >
        <input
          #fileInput
          class="file-input"
          type="file"
          [id]="id()"
          [name]="name()"
          [accept]="accept()"
          [multiple]="multiple()"
          [disabled]="disabled()"
          [required]="required()"
          [tabindex]="-1"
          [attr.aria-hidden]="true"
          (change)="onFileInputChange($event)"
        />

        <!-- Full Drop Zone Display -->
        <ui-icon [icon]="'arrow_upload'" [size]="size()" class="file__icon" />

        <p class="file__text">{{ displayText() }}</p>
        @if (displayHint()) {
          <p class="file__hint">{{ displayHint() }}</p>
        }
      </div>
    </div>
    <!-- Selected Files List -->
    @if (selectedFiles().length > 0) {
      <div class="file-list">
        @for (fileInfo of selectedFiles(); track fileInfo.id) {
          <ui-node
            class="file-list__item"
            [node]="fileInfoToNode(fileInfo)"
            [size]="size()"
            [showSelectionIndicator]="false"
            [asButton]="false"
          >
            <ng-template #before> </ng-template>

            <ng-template #after>
              <ui-button
                [icon]="'dismiss'"
                [size]="size()"
                appearance="subtle"
                (click)="removeFile($index)"
                [ariaLabel]="getRemoveFileAriaLabel(fileInfo.name)"
              ></ui-button>
            </ng-template>
          </ui-node>
        }
      </div>
    }
  }
</ui-field>
