<div
  [class]="toastClasses()"
  role="alert"
  [attr.aria-live]="variant() === 'danger' ? 'assertive' : 'polite'"
  [style.--toast-progress-duration]="showProgress() && duration() > 0 ? duration() + 'ms' : 'none'"
>
  <div [class]="toastCopyClasses()">
    @if (showIcon()) {
      <div class="toast__icon" aria-hidden="true">
        <ui-icon [icon]="getIconName()" [size]="size()" variant="filled" />
      </div>
    }
    @if (title()) {
      <div class="toast__title">{{ title() }}</div>
    }
    @if (message()) {
      <div class="toast__message">{{ message() }}</div>
    }
    <div class="toast__slot">
      <ng-content></ng-content>
    </div>
  </div>

  <div class="toast__actions">
    <ng-content select="[slot=actions]"></ng-content>

    @if (dismissible()) {
      <ui-button
        class="toast__dismiss"
        appearance="transparent"
        [variant]="variant()"
        icon="dismiss"
        size="small"
        (click)="onDismiss()"
      ></ui-button>
    }
  </div>
</div>
