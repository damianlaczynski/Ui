<div class="time-picker" [class.time-picker--inline]="inline()">
  @if (showLabel()) {
    <label [attr.for]="'time-picker-input'" class="time-picker__label">{{ label() }}</label>
  }

  <div class="time-picker__wheels" [class]="'time-picker__wheels time-picker__wheels--' + size()">
    <div class="time-picker__wheel-shell" [class.time-picker__wheel-shell--disabled]="disabled()">
      <div
        #hourWheel
        [attr.id]="'time-picker-hour-wheel'"
        class="time-picker__wheel"
        role="listbox"
        aria-label="Hours"
        [attr.tabindex]="disabled() ? -1 : 0"
        [class.time-picker__wheel--dragging]="isHourDragging()"
        (wheel)="onWheel('hour', $event)"
        (keydown)="onWheelKeyDown('hour', $event)"
        (pointerdown)="onWheelPointerDown('hour', $event)"
        (pointermove)="onWheelPointerMove('hour', $event)"
        (pointerup)="onWheelPointerUp('hour', $event)"
        (pointercancel)="onWheelPointerUp('hour', $event)"
      >
        @for (hour of hourWheelOptions; track $index) {
          <button
            type="button"
            [disabled]="disabled()"
            [class]="getHourClass($index, hour)"
            [attr.aria-selected]="hour === selectedHour()"
            (click)="onOptionClick('hour', $event)"
          >
            {{ formatHourLabel(hour) }}
          </button>
        }
      </div>
      <div class="time-picker__selection" aria-hidden="true"></div>
    </div>

    <span class="time-picker__separator">:</span>

    <div class="time-picker__wheel-shell" [class.time-picker__wheel-shell--disabled]="disabled()">
      <div
        #minuteWheel
        class="time-picker__wheel"
        role="listbox"
        aria-label="Minutes"
        [attr.tabindex]="disabled() ? -1 : 0"
        [class.time-picker__wheel--dragging]="isMinuteDragging()"
        (wheel)="onWheel('minute', $event)"
        (keydown)="onWheelKeyDown('minute', $event)"
        (pointerdown)="onWheelPointerDown('minute', $event)"
        (pointermove)="onWheelPointerMove('minute', $event)"
        (pointerup)="onWheelPointerUp('minute', $event)"
        (pointercancel)="onWheelPointerUp('minute', $event)"
      >
        @for (minute of minuteWheelOptions; track $index) {
          <button
            type="button"
            [disabled]="disabled()"
            [class]="getMinuteClass($index, minute)"
            [attr.aria-selected]="minute === selectedMinute()"
            (click)="onOptionClick('minute', $event)"
          >
            {{ formatMinuteLabel(minute) }}
          </button>
        }
      </div>
      <div class="time-picker__selection" aria-hidden="true"></div>
    </div>
  </div>
</div>
